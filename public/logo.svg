<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé terracotta → bleu ardoise (fidèle au logo réel) -->
    <linearGradient id="lg" gradientUnits="userSpaceOnUse" x1="15" y1="15" x2="105" y2="105">
      <stop offset="0%" stop-color="#C1440E"/>
      <stop offset="45%" stop-color="#9B5E3A"/>
      <stop offset="100%" stop-color="#2D4A6B"/>
    </linearGradient>
    <!-- Pattern chevron dans les bandes -->
    <pattern id="chv" x="0" y="0" width="12" height="8" patternUnits="userSpaceOnUse">
      <polyline points="1,6 6,2 11,6" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    </pattern>
    <!-- 4 demi-plans pour l'interlacing -->
    <clipPath id="top"><rect x="0" y="0" width="120" height="60"/></clipPath>
    <clipPath id="bot"><rect x="0" y="60" width="120" height="60"/></clipPath>
    <clipPath id="left"><rect x="0" y="0" width="60" height="120"/></clipPath>
    <clipPath id="right"><rect x="60" y="0" width="60" height="120"/></clipPath>
  </defs>

  <!-- Loop 1 : ovale horizontal — couche du dessous pour les croisements verticaux -->
  <ellipse cx="60" cy="60" rx="46" ry="18" fill="none" stroke="url(#lg)" stroke-width="11" clip-path="url(#bot)"/>
  <ellipse cx="60" cy="60" rx="46" ry="18" fill="none" stroke="url(#chv)" stroke-width="11" clip-path="url(#bot)"/>

  <!-- Loop 2 : ovale vertical -->
  <ellipse cx="60" cy="60" rx="18" ry="46" fill="none" stroke="url(#lg)" stroke-width="11"/>
  <ellipse cx="60" cy="60" rx="18" ry="46" fill="none" stroke="url(#chv)" stroke-width="11"/>

  <!-- Loop 1 par-dessus (moitié haute) -->
  <ellipse cx="60" cy="60" rx="46" ry="18" fill="none" stroke="url(#lg)" stroke-width="11" clip-path="url(#top)"/>
  <ellipse cx="60" cy="60" rx="46" ry="18" fill="none" stroke="url(#chv)" stroke-width="11" clip-path="url(#top)"/>

  <!-- Loop 3 : ovale diagonal 45° — couche du dessous -->
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(45,60,60)"
           fill="none" stroke="url(#lg)" stroke-width="11" clip-path="url(#right)"/>
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(45,60,60)"
           fill="none" stroke="url(#chv)" stroke-width="11" clip-path="url(#right)"/>

  <!-- Loop 4 : ovale diagonal -45° -->
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(-45,60,60)"
           fill="none" stroke="url(#lg)" stroke-width="11"/>
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(-45,60,60)"
           fill="none" stroke="url(#chv)" stroke-width="11"/>

  <!-- Loop 3 par-dessus (moitié gauche) -->
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(45,60,60)"
           fill="none" stroke="url(#lg)" stroke-width="11" clip-path="url(#left)"/>
  <ellipse cx="60" cy="60" rx="46" ry="18" transform="rotate(45,60,60)"
           fill="none" stroke="url(#chv)" stroke-width="11" clip-path="url(#left)"/>
</svg>
